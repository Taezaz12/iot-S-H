
<style>
:root {
  --sky-50:#EBF5FF;--sky-100:#BDDFF7;--sky-200:#8EC9EF;--sky-400:#3A9EDA;--sky-600:#1872A8;--sky-800:#0A4C78;
  --pink-50:#FBEAF0;--pink-100:#F4C0D1;--pink-200:#ED93B1;--pink-600:#993556;--pink-800:#72243E;
  --purple-50:#EEEDFE;--purple-100:#CECBF6;--purple-200:#AFA9EC;--purple-600:#534AB7;--purple-800:#3C3489;
  --r:var(--border-radius-lg);--rm:var(--border-radius-md);
}
*{box-sizing:border-box;margin:0;padding:0;}
.db{background:var(--sky-50);border-radius:var(--r);padding:1.25rem;font-family:var(--font-sans);}
.db-title{font-size:17px;font-weight:500;color:var(--sky-800);display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--sky-200);padding-bottom:.75rem;margin-bottom:1.25rem;}
.section-title{font-size:11px;font-weight:500;color:var(--sky-600);text-transform:uppercase;
  letter-spacing:.07em;margin:1rem 0 .5rem;display:flex;align-items:center;gap:6px;}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem;}
.card{background:#fff;border:0.5px solid var(--sky-200);border-radius:var(--r);padding:.875rem 1rem;}
.card-label{font-size:11px;color:var(--sky-600);font-weight:500;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.sw-row{display:flex;align-items:center;justify-content:space-between;}
.sw-state{font-size:13px;color:var(--sky-800);font-weight:500;}
.sw-btn{position:relative;width:48px;height:26px;border-radius:13px;border:none;
  cursor:pointer;transition:background .2s;background:var(--sky-200);flex-shrink:0;}
.sw-btn.on{background:var(--sky-400);}
.sw-btn::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:left .2s;}
.sw-btn.on::after{left:25px;}
.led-row{display:flex;align-items:center;justify-content:space-between;}
.led-dot{width:18px;height:18px;border-radius:50%;background:var(--sky-100);
  border:1.5px solid var(--sky-400);transition:background .3s,box-shadow .3s;flex-shrink:0;}
.led-dot.on-light{background:#85B7EB;border-color:var(--sky-600);box-shadow:0 0 6px #85B7EB;}
.led-dot.on-fan{background:var(--pink-200);border-color:var(--pink-600);box-shadow:0 0 6px var(--pink-200);}
.led-txt{font-size:13px;color:var(--sky-800);font-weight:500;}
.gauge-card{background:#fff;border:0.5px solid var(--sky-200);border-radius:var(--r);
  padding:.875rem 1rem;display:flex;flex-direction:column;align-items:center;}
.gauge-svg{width:130px;height:76px;}
.gauge-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.g-input-row{display:flex;align-items:center;gap:6px;margin-top:8px;width:100%;}
.g-input{width:60px;padding:5px 7px;border:0.5px solid var(--sky-200);border-radius:var(--rm);
  background:var(--sky-50);color:var(--sky-800);font-size:13px;font-family:var(--font-sans);
  text-align:center;outline:none;}
.g-input:focus{border-color:var(--sky-400);}
.send-btn{flex:1;background:var(--sky-400);color:#fff;border:none;border-radius:var(--rm);
  padding:5px 8px;font-size:12px;cursor:pointer;font-family:var(--font-sans);
  display:flex;align-items:center;justify-content:center;gap:4px;transition:background .15s;}
.send-btn:hover{background:var(--sky-600);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}
.send-btn.pink{background:var(--pink-200);color:var(--pink-800);}
.send-btn.pink:hover{background:var(--pink-600);color:#fff;}
.send-btn.purple{background:var(--purple-200);color:var(--purple-800);}
.send-btn.purple:hover{background:var(--purple-600);color:#fff;}
.stag{font-size:10px;padding:2px 7px;border-radius:var(--rm);margin-top:6px;display:inline-block;}
.stag.ok{background:#EAF3DE;color:#3B6D11;}
.stag.err{background:#FCEBEB;color:#A32D2D;}
.stag.idle{background:var(--sky-50);color:var(--sky-600);}
</style>

<script>
const TK = 'JfbWXXXArhe1V6U-12F13e1nsvpyxxm8';
const B = 'https://blynk.cloud/external/api';
const swState = [0,0,0,0];

function setTag(id, ok, msg){
  const el=document.getElementById(id);
  if(!el) return;
  el.textContent=(ok?'✓ ':'✗ ')+msg;
  el.className='stag '+(ok?'ok':'err');
}

async function callApi(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return await r.text();
}

function updateLed(pin, val){
  const dot=document.getElementById('led'+pin);
  const txt=document.getElementById('led'+pin+'-txt');
  if(!dot||!txt) return;
  const isLight=(pin===4||pin===5);
  const isOn=parseInt(val)===1;
  dot.className='led-dot'+(isOn?(isLight?' on-light':' on-fan'):'');
  txt.textContent=isOn?'ทำงาน':'ดับ';
}

async function toggleSw(v){
  swState[v]=swState[v]===0?1:0;
  const val=swState[v];
  const btn=document.getElementById('sw'+v);
  const txt=document.getElementById('sw'+v+'-txt');
  const stId='sw'+v+'-st';
  const isFan=(v>=2);
  if(isFan){
    btn.style.background=val?'#ED93B1':'#F4C0D1';
  } else {
    btn.className='sw-btn'+(val?' on':'');
  }
  txt.textContent=val?'เปิด':'ปิด';
  try{
    await callApi(`${B}/update?token=${TK}&V${v}=${val}`);
    const ledPin=v+4;
    await callApi(`${B}/update?token=${TK}&V${ledPin}=${val}`);
    updateLed(ledPin,val);
    setTag(stId,true,val?'เปิดแล้ว':'ปิดแล้ว');
  } catch(e){
    setTag(stId,false,'เชื่อมต่อไม่ได้');
  }
}

function updateGauge(v, raw, min, max, color, unit){
  const val=Math.min(Math.max(parseFloat(raw)||0, min), max);
  const pct=(val-min)/(max-min);
  const fill=Math.round(pct*179);
  const path=document.getElementById('g'+v+'-fill');
  const label=document.getElementById('g'+v+'-val');
  if(path) path.setAttribute('stroke-dasharray', fill+' '+(179-fill));
  if(label) label.textContent=Math.round(val);
}

async function sendGauge(v, btnId, stId){
  const input=document.getElementById('in'+v);
  if(!input) return;
  const val=input.value;
  const btn=document.getElementById(btnId);
  if(btn) btn.disabled=true;
  try{
    await callApi(`${B}/update?token=${TK}&V${v}=${val}`);
    setTag(stId,true,'ส่งค่า '+val+' แล้ว');
  } catch(e){
    setTag(stId,false,'เชื่อมต่อไม่ได้');
  }
  if(btn) btn.disabled=false;
}

updateGauge(8,29,0,50,'#3A9EDA','°C');
updateGauge(9,100,0,500,'#D4537E','µg/m³');
updateGauge(10,22,0,100,'#7F77DD','%RH');
</script>
